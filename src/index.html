<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#03060f">
  <title>StateSync</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="shortcut icon" href="/favicon.jpg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #03060f; --panel: rgba(10, 16, 32, 0.85); --border: #00f0ff; --accent: #ff8800; --green: #00ff66; --red: #ff0055; --text: #c0d0e8; }
    body.theme-matrix { --bg: #010502; --panel: rgba(5,20,10,0.85); --border: #39ff14; --accent: #00ff66; }
    body.theme-outrun { --bg: #140526; --panel: rgba(30,10,50,0.85); --border: #ff007f; --accent: #00f0ff; }
    body.theme-crimson { --bg: #080103; --panel: rgba(25,5,10,0.85); --border: #ff003c; --accent: #990000; }
    body.theme-solarized { --bg: #002b36; --panel: rgba(7,54,66,0.85); --border: #b58900; --accent: #268bd2; }
    body.theme-nordic { --bg: #2e3440; --panel: rgba(59,66,82,0.85); --border: #88c0d0; --accent: #81a1c1; }
    body.theme-mono { --bg: #0a0a0a; --panel: rgba(25,25,25,0.85); --border: #ffffff; --accent: #888888; }
    body.theme-military { --bg: #181c14; --panel: rgba(30,36,24,0.85); --border: #a3be8c; --accent: #ebcb8b; }
    body.theme-royal { --bg: #0f051c; --panel: rgba(35,15,55,0.85); --border: #ffd700; --accent: #8a2be2; }
    body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; margin: 0; padding: 30px; display: flex; justify-content: center; transition: background 0.3s; }
    .container { max-width: 1000px; width: 100%; }
    h1 { font-size: 28px; border-bottom: 2px solid var(--border); padding-bottom: 10px; margin: 0 0 30px 0; color: var(--border); display: flex; justify-content: space-between; align-items: center; }
    h2 { font-size: 16px; margin: 0 0 15px 0; color: var(--border); border-left: 3px solid var(--border); padding-left: 8px; text-transform: uppercase; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 20px; box-shadow: 0 0 15px rgba(0,240,255,0.15); margin-bottom: 25px; position: relative; }
    .row-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 25px; }
    .server-row { display: flex; justify-content: space-between; align-items: center; background: rgba(5,10,25,0.8); border: 1px solid rgba(0,240,255,0.2); padding: 12px 18px; margin-bottom: 10px; }
    .server-info { display: flex; align-items: center; gap: 12px; }
    .status-Connected { color: var(--green); }
    .status-Reconnecting { color: var(--accent); }
    .status-Offline { color: var(--red); }
    .btn { background: transparent; border: 1px solid var(--border); color: var(--border); padding: 8px 16px; font-family: inherit; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .btn:hover { background: var(--border); color: #000; box-shadow: 0 0 10px var(--border); }
    .btn-accent { border-color: var(--accent); color: var(--accent); }
    .btn-accent:hover { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }
    .btn-danger { border-color: var(--red); color: var(--red); }
    .btn-danger:hover { background: var(--red); color: #000; box-shadow: 0 0 10px var(--red); }
    .badge { border: 1px solid rgba(0,240,255,0.4); padding: 2px 6px; font-size: 11px; color: var(--border); }
    .log-feed { font-size: 12px; background: rgba(5,8,18,0.9); border: 1px solid rgba(0,240,255,0.2); padding: 15px; max-height: 450px; overflow-y: auto; color: var(--green); }
    .log-line { border-bottom: 1px solid rgba(0,255,102,0.05); padding: 4px 0; }
    .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .modal-content { background: var(--bg); border: 2px solid var(--border); box-shadow: 0 0 30px var(--border); width: 450px; padding: 25px; position: relative; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
    input, select { background: rgba(5,10,25,0.8); border: 1px solid rgba(0,240,255,0.4); color: var(--text); padding: 8px; font-family: inherit; font-size: 13px; outline: none; }
    select option { background: #0a0e17; color: var(--text); }
    input:focus, select:focus { border-color: var(--border); box-shadow: 0 0 8px rgba(0,240,255,0.4); }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--panel); border: 1px solid var(--border); padding: 12px 20px; display: none; animation: pulse 1s infinite alternate; }
    @keyframes pulse { from { box-shadow: 0 0 5px var(--border); } to { box-shadow: 0 0 15px var(--border); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <span id="systemStatusText">[ SYNC ENGINE: ONLINE ]</span>
      <div style="display: flex; gap: 10px; align-items: center;">
        <select id="themeSelector" class="btn" style="background:#000;padding:7px 10px;" onchange="setTheme(this.value)">
          <option value="cyberpunk">CYBERPUNK</option><option value="matrix">MATRIX</option><option value="outrun">SYNTHWAVE</option><option value="crimson">CRIMSON</option>
          <option value="solarized">SOLARIZED</option><option value="nordic">NORDIC</option><option value="mono">MONOCHROME</option><option value="military">MILITARY</option><option value="royal">ROYAL</option>
        </select>
        <button class="btn btn-accent" onclick="openSettingsModal()">[ SETTINGS ]</button>
        <button class="btn" onclick="openServerModal(-1)">[ + ADD MODULE ]</button>
      </div>
    </h1>

    <div class="row-grid">
      <div class="card"><h2>[ MAPPED USERS ]</h2><div id="syncedUsers" style="display: flex; flex-direction: column; gap: 8px;"></div></div>
      <div class="card"><h2>[ STREAM MONITOR ]</h2><div id="activeSessions" style="display: flex; flex-direction: column; gap: 10px;"><div style="color: var(--accent)">NO ACTIVE STREAMS DETECTED</div></div></div>
    </div>

    <div class="card"><h2>[ TRANSCEIVER MODULES ]</h2><div class="server-list" id="serverList"></div></div>

    <div class="card"><h2>[ TERMINAL LOG FEED ]</h2><div class="log-feed" id="syncLogs"></div></div>
  </div>

  <div class="modal" id="serverModal">
    <div class="modal-content">
      <h2 id="modalTitle">[ CONFIGURE MODULE ]</h2>
      <form id="serverForm">
        <div class="form-group"><label>MODULE TYPE</label><select id="serverType"><option value="jellyfin">JELLYFIN</option><option value="emby">EMBY</option></select></div>
        <div class="form-group"><label>IDENT NAME</label><input type="text" id="serverName" required></div>
        <div class="form-group"><label>TRANSCEIVER IP:PORT</label><input type="url" id="serverUrl" placeholder="http://192.168.3.10:8096" required></div>
        <div class="form-group"><label>ACCESS KEY (API)</label><input type="password" id="serverKey" required></div>
        <div class="form-group"><label>SYNC DIRECTION</label><select id="serverDirection"><option value="both">BI-DIRECTIONAL</option><option value="send">SEND ONLY</option><option value="receive">RECEIVE ONLY</option></select></div>
        <div style="display: flex; justify-content: space-between; margin-top: 20px;">
          <button type="submit" class="btn">[ SAVE ]</button>
          <button type="button" class="btn btn-accent" onclick="testConnection()">[ TEST LINK ]</button>
          <button type="button" class="btn btn-danger" onclick="closeModal('serverModal')">[ ABORT ]</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <h2>[ GLOBAL SETTINGS ]</h2>
      <div class="form-group"><label>SYNC WINDOW THRESHOLD (SECONDS)</label><input type="number" id="syncThreshold" min="1"></div>
      <div style="display: flex; gap: 12px; margin-top: 20px;">
        <button class="btn" onclick="saveSettings()">[ SAVE ]</button>
        <button class="btn btn-danger" onclick="closeModal('settingsModal')">[ ABORT ]</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(() => {}); }
    const $ = id => document.getElementById(id);
    let currentConfig = { servers: [], sync_threshold_seconds: 5 }; let editIndex = -1;
    function setTheme(n) { document.body.className = n === 'cyberpunk' ? '' : `theme-${n}`; localStorage.setItem('hud-theme', n); }
    async function loadDashboard() {
      try {
        const [configRes, statusRes] = await Promise.all([fetch('/api/config'), fetch('/api/status')]);
        currentConfig = await configRes.json(); const status = await statusRes.json();
        $('syncThreshold').value = currentConfig.sync_threshold_seconds;
        const statusSpan = $('systemStatusText');
        if (currentConfig.servers.length === 0) {
          statusSpan.innerText = '[ SYNC ENGINE: IDLE ]'; statusSpan.style.color = 'var(--border)';
        } else {
          const statuses = status.servers.map(s => s.websocket_status);
          if (statuses.length === 0 || statuses.every(s => s === 'Offline')) {
            statusSpan.innerText = '[ SYNC ENGINE: OFFLINE ]'; statusSpan.style.color = 'var(--red)';
          } else if (statuses.some(s => s === 'Offline' || s === 'Reconnecting')) {
            statusSpan.innerText = '[ SYNC ENGINE: DEGRADED ]'; statusSpan.style.color = 'var(--accent)';
          } else {
            statusSpan.innerText = '[ SYNC ENGINE: ONLINE ]'; statusSpan.style.color = 'var(--green)';
          }
        }
        const listDiv = $('serverList');
        if (currentConfig.servers.length === 0) { listDiv.innerHTML = '<div style="color: var(--accent)">NO CONFIGURED TRANSCEIVERS</div>'; } else {
          listDiv.innerHTML = '';
          currentConfig.servers.forEach((srv, idx) => {
            const sStatus = status.servers.find(s => s.name === srv.name) || { users_count: 0, media_count: 0, websocket_status: 'Offline' };
            const row = document.createElement('div'); row.className = 'server-row';
            const dirBadge = srv.sync_direction === 'send' ? ' [SEND ONLY]' : (srv.sync_direction === 'receive' ? ' [RCV ONLY]' : '');
            row.innerHTML = `<div class="server-info"><span class="status-${sStatus.websocket_status}">[ ${sStatus.websocket_status.toUpperCase()} ]</span><div><span style="font-weight:600;color:#fff">${srv.name}</span> <span class="badge">${srv.is_emby ? 'EMBY' : 'JELLYFIN'}${dirBadge}</span><div style="font-size:11px;color:var(--text);margin-top:2px">${srv.url}</div></div></div><div class="server-info"><span style="font-size:12px">${sStatus.users_count} USERS | ${sStatus.media_count} CACHED</span><button class="btn" onclick="openServerModal(${idx})">[ EDIT ]</button><button class="btn btn-danger" onclick="deleteServer(${idx})">[ WIPE ]</button></div>`;
            listDiv.appendChild(row);
          });
        }
        const activeDiv = $('activeSessions');
        if (status.active_sessions && status.active_sessions.length > 0) {
          activeDiv.innerHTML = '';
          status.active_sessions.forEach(sess => {
            const mins = Math.floor(sess.position / 60); const secs = Math.floor(sess.position % 60).toString().padStart(2, '0');
            activeDiv.innerHTML += `<div class="server-row" style="border-color:var(--accent)"><div class="server-info"><div><div style="font-weight:600;color:#fff">${sess.item}</div><div style="font-size:11px;color:var(--text)">USER: ${sess.user} | SOURCE: ${sess.server}</div></div></div><div style="display:flex;align-items:center;gap:10px"><span class="badge" style="border-color:var(--accent);color:var(--accent)">${mins}:${secs}</span><span style="font-size:11px;color:${sess.is_paused ? 'var(--accent)' : 'var(--green)'}">[ ${sess.is_paused ? 'PAUSED' : 'PLAYING'} ]</span></div></div>`;
          });
        } else { activeDiv.innerHTML = '<div style="color:var(--accent)">NO ACTIVE STREAMS DETECTED</div>'; }
        const usersDiv = $('syncedUsers');
        if (!status.servers || status.servers.length === 0) {
          usersDiv.innerHTML = '<div style="color:var(--accent)">NO ACTIVE TRANSCEIVERS</div>';
        } else {
          usersDiv.innerHTML = '';
          const header = document.createElement('div');
          header.style.display = 'flex'; header.style.justifyContent = 'space-between';
          header.style.color = 'var(--border)'; header.style.fontWeight = '600'; header.style.fontSize = '12px';
          header.style.borderBottom = '1px solid rgba(0,240,255,0.3)'; header.style.paddingBottom = '6px'; header.style.marginBottom = '12px';
          status.servers.forEach((srv, idx) => {
            const title = document.createElement('div'); title.innerText = srv.name.toUpperCase(); title.style.width = '120px';
            title.style.textAlign = idx === 0 ? 'left' : (idx === status.servers.length - 1 ? 'right' : 'center');
            header.appendChild(title);
            if (idx < status.servers.length - 1) {
              const placeholder = document.createElement('div'); placeholder.style.flex = '1'; header.appendChild(placeholder);
            }
          });
          usersDiv.appendChild(header);
          const mapped = status.mapped_users || [];
          mapped.forEach(group => {
            let cells = '';
            group.forEach((username, idx) => {
              const align = idx === 0 ? 'left' : (idx === group.length - 1 ? 'right' : 'center');
              cells += username ? `<div style="color:#fff;font-size:12px;width:120px;text-align:${align}">${username}</div>` : `<div style="color:var(--text);opacity:0.3;font-size:12px;width:120px;text-align:${align}">[ UNMAPPED ]</div>`;
              if (idx < group.length - 1) {
                const isGreen = username !== null && group.slice(idx + 1).some(u => u !== null);
                cells += `<div style="flex:1;border-bottom:1px dotted ${isGreen ? 'var(--green)' : 'var(--accent)'};margin:0 15px;opacity:${isGreen ? '0.7' : '0.2'}"></div>`;
              }
            });
            usersDiv.innerHTML += `<div style="display:flex;align-items:center;padding:6px 0">${cells}</div>`;
          });
          status.servers.forEach((srv, srvIdx) => {
            if (srv.users) srv.users.forEach(username => {
              if (!mapped.some(group => group.some(u => u === username))) {
                let cells = '';
                for (let i = 0; i < status.servers.length; i++) {
                  const align = i === 0 ? 'left' : (i === status.servers.length - 1 ? 'right' : 'center');
                  cells += `<div style="font-size:12px;width:120px;text-align:${align};color:${i === srvIdx ? 'var(--accent)' : 'var(--text);opacity:0.3'}">${i === srvIdx ? username : '[ UNMAPPED ]'}</div>`;
                  if (i < status.servers.length - 1) cells += `<div style="flex:1;border-bottom:1px dotted var(--accent);margin:0 15px;opacity:0.3"></div>`;
                }
                usersDiv.innerHTML += `<div style="display:flex;align-items:center;padding:6px 0">${cells}</div>`;
              }
            });
          });
        }
        const logsDiv = $('syncLogs');
        if (status.sync_logs && status.sync_logs.length > 0) {
          logsDiv.innerHTML = '';
          status.sync_logs.forEach(log => {
            if (log.level === 'success' && log.source_name) {
              const sCol = log.source_is_emby ? 'var(--green)' : '#cc00ff'; const tCol = log.target_is_emby ? 'var(--green)' : '#cc00ff';
              const sBadge = log.source_is_emby ? 'EMBY' : 'JELLYFIN'; const tBadge = log.target_is_emby ? 'EMBY' : 'JELLYFIN';
              logsDiv.innerHTML += `<div class="log-line">&gt; [${log.timestamp}] ${log.message.toUpperCase()} FROM <span style="color:${sCol}">[${sBadge}: ${log.source_name.toUpperCase()}]</span> -&gt; <span style="color:${tCol}">[${tBadge}: ${log.target_name.toUpperCase()}]</span></div>`;
            } else {
              const color = log.level === 'error' ? 'var(--red)' : (log.level === 'warn' ? 'var(--accent)' : 'var(--border)');
              logsDiv.innerHTML += `<div class="log-line">&gt; [${log.timestamp}] <span style="color:${color}">[${log.level.toUpperCase()}] ${log.message.toUpperCase()}</span></div>`;
            }
          });
          logsDiv.scrollTop = logsDiv.scrollHeight;
        } else { logsDiv.innerHTML = '<div style="color:var(--green)">> LISTENING FOR METRIC EVENTS...</div>'; }
      } catch (err) { console.error(err); }
    }
    function openServerModal(idx) {
      editIndex = idx; const isAdd = idx === -1;
      $('modalTitle').innerText = isAdd ? '[ ADD TRANSCEIVER MODULE ]' : '[ EDIT TRANSCEIVER MODULE ]';
      if (isAdd) { $('serverForm').reset(); $('serverDirection').value = 'both'; } else {
        const srv = currentConfig.servers[idx]; $('serverType').value = srv.is_emby ? 'emby' : 'jellyfin';
        $('serverName').value = srv.name; $('serverUrl').value = srv.url;
        $('serverKey').value = srv.api_key; $('serverDirection').value = srv.sync_direction || 'both';
      }
      $('serverModal').style.display = 'flex';
    }
    function openSettingsModal() { $('settingsModal').style.display = 'flex'; }
    function closeModal(id) { $(id).style.display = 'none'; }
    function testConnection() {
      const type = $('serverType').value, url = $('serverUrl').value, api_key = $('serverKey').value;
      if (!url || !api_key) return showToast('LINK DATA INCOMPLETE');
      showToast('PINGING LINK ADDRESS...');
      fetch('/api/test_connection', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url, api_key, is_emby: type === 'emby' }) })
        .then(async r => showToast((await r.json()).message.toUpperCase())).catch(() => showToast('LINK RESPONSE FAILED'));
    }
    $('serverForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const s = { name: $('serverName').value, url: $('serverUrl').value, api_key: $('serverKey').value, is_emby: $('serverType').value === 'emby', sync_direction: $('serverDirection').value };
      if (editIndex === -1) { currentConfig.servers.push(s); } else { currentConfig.servers[editIndex] = s; }
      closeModal('serverModal'); await saveConfig();
    });
    async function deleteServer(idx) { currentConfig.servers.splice(idx, 1); await saveConfig(); }
    async function saveSettings() { currentConfig.sync_threshold_seconds = parseInt($('syncThreshold').value); closeModal('settingsModal'); await saveConfig(); }
    async function saveConfig() {
      try {
        const res = await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(currentConfig) });
        showToast((await res.json()).message.toUpperCase()); setTimeout(loadDashboard, 1200);
      } catch (err) { showToast('WRITE CONFIG FAILED'); }
    }
    function showToast(msg) { const toast = $('toast'); toast.innerText = `> ${msg}`; toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; }, 4000); }
    const savedTheme = localStorage.getItem('hud-theme') || 'cyberpunk'; setTheme(savedTheme); $('themeSelector').value = savedTheme; loadDashboard(); setInterval(loadDashboard, 3000);
  </script>
</body>
</html>
