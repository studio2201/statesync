<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StateSync</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #03060f; --panel: rgba(10, 16, 32, 0.85); --border: #00f0ff; --accent: #ff8800; --green: #00ff66; --red: #ff0055; --text: #c0d0e8; }
    body.theme-matrix { --bg: #010502; --panel: rgba(5,20,10,0.85); --border: #39ff14; --accent: #00ff66; }
    body.theme-outrun { --bg: #140526; --panel: rgba(30,10,50,0.85); --border: #ff007f; --accent: #00f0ff; }
    body.theme-crimson { --bg: #080103; --panel: rgba(25,5,10,0.85); --border: #ff003c; --accent: #990000; }
    body.theme-solarized { --bg: #002b36; --panel: rgba(7,54,66,0.85); --border: #b58900; --accent: #268bd2; }
    body.theme-nordic { --bg: #2e3440; --panel: rgba(59,66,82,0.85); --border: #88c0d0; --accent: #81a1c1; }
    body.theme-mono { --bg: #0a0a0a; --panel: rgba(25,25,25,0.85); --border: #ffffff; --accent: #888888; }
    body.theme-military { --bg: #181c14; --panel: rgba(30,36,24,0.85); --border: #a3be8c; --accent: #ebcb8b; }
    body.theme-royal { --bg: #0f051c; --panel: rgba(35,15,55,0.85); --border: #ffd700; --accent: #8a2be2; }
    body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; margin: 0; padding: 30px; display: flex; justify-content: center; transition: background 0.3s; }
    .container { max-width: 1000px; width: 100%; }
    h1 { font-size: 28px; text-shadow: 0 0 10px var(--border); border-bottom: 2px solid var(--border); padding-bottom: 10px; margin: 0 0 30px 0; color: var(--border); display: flex; justify-content: space-between; align-items: center; }
    h2 { font-size: 16px; margin: 0 0 15px 0; color: var(--border); border-left: 3px solid var(--border); padding-left: 8px; text-shadow: 0 0 5px rgba(0,240,255,0.4); text-transform: uppercase; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 20px; box-shadow: 0 0 15px rgba(0,240,255,0.15); margin-bottom: 25px; position: relative; }
    .row-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 25px; }
    .server-row { display: flex; justify-content: space-between; align-items: center; background: rgba(5,10,25,0.8); border: 1px solid rgba(0,240,255,0.2); padding: 12px 18px; margin-bottom: 10px; }
    .server-info { display: flex; align-items: center; gap: 12px; }
    .status-Connected { color: var(--green); text-shadow: 0 0 8px var(--green); }
    .status-Reconnecting { color: var(--accent); text-shadow: 0 0 8px var(--accent); }
    .status-Offline { color: var(--red); text-shadow: 0 0 8px var(--red); }
    .btn { background: transparent; border: 1px solid var(--border); color: var(--border); padding: 8px 16px; font-family: inherit; font-size: 12px; cursor: pointer; text-shadow: 0 0 5px var(--border); transition: all 0.2s; }
    .btn:hover { background: var(--border); color: #000; box-shadow: 0 0 10px var(--border); }
    .btn-accent { border-color: var(--accent); color: var(--accent); text-shadow: 0 0 5px var(--accent); }
    .btn-accent:hover { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }
    .btn-danger { border-color: var(--red); color: var(--red); text-shadow: 0 0 5px var(--red); }
    .btn-danger:hover { background: var(--red); color: #000; box-shadow: 0 0 10px var(--red); }
    .badge { border: 1px solid rgba(0,240,255,0.4); padding: 2px 6px; font-size: 11px; color: var(--border); }
    .log-feed { font-size: 12px; background: rgba(5,8,18,0.9); border: 1px solid rgba(0,240,255,0.2); padding: 15px; max-height: 200px; overflow-y: auto; color: var(--green); text-shadow: 0 0 3px rgba(0,255,102,0.4); }
    .log-line { border-bottom: 1px solid rgba(0,255,102,0.05); padding: 4px 0; }
    .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .modal-content { background: var(--bg); border: 2px solid var(--border); box-shadow: 0 0 30px var(--border); width: 450px; padding: 25px; position: relative; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
    input, select { background: rgba(5,10,25,0.8); border: 1px solid rgba(0,240,255,0.4); color: var(--text); padding: 8px; font-family: inherit; font-size: 13px; outline: none; }
    input:focus, select:focus { border-color: var(--border); box-shadow: 0 0 8px rgba(0,240,255,0.4); }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--panel); border: 1px solid var(--border); padding: 12px 20px; display: none; animation: pulse 1s infinite alternate; }
    @keyframes pulse { from { box-shadow: 0 0 5px var(--border); } to { box-shadow: 0 0 15px var(--border); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <span id="systemStatusText">[ SYSTEM STATUS: ONLINE ]</span>
      <div style="display: flex; gap: 10px; align-items: center;">
        <select id="themeSelector" class="btn" style="background:#000;padding:7px 10px;" onchange="setTheme(this.value)">
          <option value="cyberpunk">CYBERPUNK</option><option value="matrix">MATRIX</option><option value="outrun">SYNTHWAVE</option><option value="crimson">CRIMSON</option>
          <option value="solarized">SOLARIZED</option><option value="nordic">NORDIC</option><option value="mono">MONOCHROME</option><option value="military">MILITARY</option><option value="royal">ROYAL</option>
        </select>
        <button class="btn btn-accent" onclick="openSettingsModal()">[ SETTINGS ]</button>
        <button class="btn" onclick="openServerModal(-1)">[ + ADD MODULE ]</button>
      </div>
    </h1>

    <div class="row-grid">
      <div class="card">
        <h2>[ MAPPED USERS ]</h2>
        <div id="syncedUsers" style="display: flex; flex-direction: column; gap: 8px;"></div>
      </div>
      <div class="card">
        <h2>[ STREAM MONITOR ]</h2>
        <div id="activeSessions" style="display: flex; flex-direction: column; gap: 10px;">
          <div style="color: var(--accent)">NO ACTIVE STREAMS DETECTED</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>[ TRANSCEIVER MODULES ]</h2>
      <div class="server-list" id="serverList"></div>
    </div>

    <div class="card">
      <h2>[ TERMINAL LOG FEED ]</h2>
      <div class="log-feed" id="syncLogs"></div>
    </div>
  </div>

  <div class="modal" id="serverModal">
    <div class="modal-content">
      <h2 id="modalTitle">[ CONFIGURE MODULE ]</h2>
      <form id="serverForm">
        <div class="form-group"><label>MODULE TYPE</label><select id="serverType"><option value="jellyfin">JELLYFIN</option><option value="emby">EMBY</option></select></div>
        <div class="form-group"><label>IDENT NAME</label><input type="text" id="serverName" required></div>
        <div class="form-group"><label>TRANSCEIVER IP:PORT</label><input type="url" id="serverUrl" placeholder="http://192.168.3.10:8096" required></div>
        <div class="form-group"><label>ACCESS KEY (API)</label><input type="password" id="serverKey" required></div>
        <div style="display: flex; justify-content: space-between; margin-top: 20px;">
          <button type="submit" class="btn">[ SAVE ]</button>
          <button type="button" class="btn btn-accent" onclick="testConnection()">[ TEST LINK ]</button>
          <button type="button" class="btn btn-danger" onclick="closeModal('serverModal')">[ ABORT ]</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <h2>[ GLOBAL SETTINGS ]</h2>
      <div class="form-group"><label>SYNC WINDOW THRESHOLD (SECONDS)</label><input type="number" id="syncThreshold" min="1"></div>
      <div style="display: flex; gap: 12px; margin-top: 20px;">
        <button class="btn" onclick="saveSettings()">[ SAVE ]</button>
        <button class="btn btn-danger" onclick="closeModal('settingsModal')">[ ABORT ]</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let currentConfig = { servers: [], sync_threshold_seconds: 5 }; let editIndex = -1;
    function setTheme(n) { document.body.className = n === 'cyberpunk' ? '' : `theme-${n}`; localStorage.setItem('hud-theme', n); }
    async function loadDashboard() {
      try {
        const [configRes, statusRes] = await Promise.all([fetch('/api/config'), fetch('/api/status')]);
        currentConfig = await configRes.json(); const status = await statusRes.json();
        document.getElementById('syncThreshold').value = currentConfig.sync_threshold_seconds;
        const statusSpan = document.getElementById('systemStatusText');
        if (currentConfig.servers.length === 0) {
          statusSpan.innerText = '[ SYSTEM STATUS: IDLE ]'; statusSpan.style.color = 'var(--border)'; statusSpan.style.textShadow = '0 0 8px var(--border)';
        } else {
          const statuses = status.servers.map(s => s.websocket_status);
          if (statuses.length === 0 || statuses.every(s => s === 'Offline')) {
            statusSpan.innerText = '[ SYSTEM STATUS: OFFLINE ]'; statusSpan.style.color = 'var(--red)'; statusSpan.style.textShadow = '0 0 8px var(--red)';
          } else if (statuses.some(s => s === 'Offline' || s === 'Reconnecting')) {
            statusSpan.innerText = '[ SYSTEM STATUS: DEGRADED ]'; statusSpan.style.color = 'var(--accent)'; statusSpan.style.textShadow = '0 0 8px var(--accent)';
          } else {
            statusSpan.innerText = '[ SYSTEM STATUS: ONLINE ]'; statusSpan.style.color = 'var(--green)'; statusSpan.style.textShadow = '0 0 8px var(--green)';
          }
        }
        const listDiv = document.getElementById('serverList');
        if (currentConfig.servers.length === 0) { listDiv.innerHTML = '<div style="color: var(--accent)">NO CONFIGURED TRANSCEIVERS</div>'; } else {
          listDiv.innerHTML = '';
          currentConfig.servers.forEach((srv, idx) => {
            const sStatus = status.servers.find(s => s.name === srv.name) || { users_count: 0, media_count: 0, websocket_status: 'Offline' };
            const row = document.createElement('div'); row.className = 'server-row';
            row.innerHTML = `<div class="server-info"><span class="status-${sStatus.websocket_status}">[ ${sStatus.websocket_status.toUpperCase()} ]</span><div><span style="font-weight:600;color:#fff">${srv.name}</span> <span class="badge">${srv.is_emby ? 'EMBY' : 'JELLYFIN'}</span><div style="font-size:11px;color:var(--text);margin-top:2px">${srv.url}</div></div></div><div class="server-info"><span style="font-size:12px">${sStatus.users_count} USERS | ${sStatus.media_count} CACHED</span><button class="btn" onclick="openServerModal(${idx})">[ EDIT ]</button><button class="btn btn-danger" onclick="deleteServer(${idx})">[ WIPE ]</button></div>`;
            listDiv.appendChild(row);
          });
        }
        const activeDiv = document.getElementById('activeSessions');
        if (status.active_sessions && status.active_sessions.length > 0) {
          activeDiv.innerHTML = '';
          status.active_sessions.forEach(sess => {
            const row = document.createElement('div'); row.className = 'server-row'; row.style.borderColor = 'var(--accent)';
            const mins = Math.floor(sess.position / 60); const secs = Math.floor(sess.position % 60).toString().padStart(2, '0');
            row.innerHTML = `<div class="server-info"><div><div style="font-weight:600;color:#fff">${sess.item}</div><div style="font-size:11px;color:var(--text)">USER: ${sess.user} | SOURCE: ${sess.server}</div></div></div><div style="display:flex;align-items:center;gap:10px"><span class="badge" style="border-color:var(--accent);color:var(--accent)">${mins}:${secs}</span><span style="font-size:11px;color:${sess.is_paused ? 'var(--accent)' : 'var(--green)'}">[ ${sess.is_paused ? 'PAUSED' : 'PLAYING'} ]</span></div>`;
            activeDiv.appendChild(row);
          });
        } else { activeDiv.innerHTML = '<div style="color:var(--accent)">NO ACTIVE STREAMS DETECTED</div>'; }
        const usersDiv = document.getElementById('syncedUsers');
        if (status.synced_users && status.synced_users.length > 0) {
          usersDiv.innerHTML = '';
          status.synced_users.forEach(u => {
            const row = document.createElement('div'); row.className = 'server-row'; row.style.padding = '8px 12px'; row.style.margin = '0 0 5px 0';
            row.innerHTML = `<span style="color:var(--green)">[ MAPPED ]</span> <span style="color:#fff">${u}</span>`;
            usersDiv.appendChild(row);
          });
        } else { usersDiv.innerHTML = '<div style="color:var(--accent)">NO SYNCD LDAP USERS FOUND</div>'; }
        const logsDiv = document.getElementById('syncLogs');
        if (status.sync_logs && status.sync_logs.length > 0) {
          logsDiv.innerHTML = '';
          status.sync_logs.forEach(log => {
            const line = document.createElement('div'); line.className = 'log-line';
            const sCol = log.source_is_emby ? 'var(--green)' : '#cc00ff'; const tCol = log.target_is_emby ? 'var(--green)' : '#cc00ff';
            const sBadge = log.source_is_emby ? 'EMBY' : 'JELLYFIN'; const tBadge = log.target_is_emby ? 'EMBY' : 'JELLYFIN';
            line.innerHTML = `&gt; [${log.timestamp}] SYNCED '${log.item.toUpperCase()}' FOR ${log.user.toUpperCase()} FROM <span style="color:${sCol}">[${sBadge}: ${log.source_name.toUpperCase()}]</span> -&gt; <span style="color:${tCol}">[${tBadge}: ${log.target_name.toUpperCase()}]</span> TO ${log.position_secs.toFixed(1)}S${log.is_paused ? ' (PAUSED)' : ''}`;
            logsDiv.appendChild(line);
          });
        } else { logsDiv.innerHTML = '<div style="color:var(--green)">> LISTENING FOR METRIC EVENTS...</div>'; }
      } catch (err) { console.error(err); }
    }
    function openServerModal(idx) {
      editIndex = idx;
      if (idx === -1) { document.getElementById('modalTitle').innerText = '[ ADD TRANSCEIVER MODULE ]'; document.getElementById('serverForm').reset(); } else {
        document.getElementById('modalTitle').innerText = '[ EDIT TRANSCEIVER MODULE ]';
        const srv = currentConfig.servers[idx]; document.getElementById('serverType').value = srv.is_emby ? 'emby' : 'jellyfin';
        document.getElementById('serverName').value = srv.name; document.getElementById('serverUrl').value = srv.url; document.getElementById('serverKey').value = srv.api_key;
      }
      document.getElementById('serverModal').style.display = 'flex';
    }
    function openSettingsModal() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    async function testConnection() {
      const type = document.getElementById('serverType').value; const url = document.getElementById('serverUrl').value; const api_key = document.getElementById('serverKey').value;
      if (!url || !api_key) { showToast('LINK DATA INCOMPLETE'); return; }
      showToast('PINGING LINK ADDRESS...');
      try {
        const res = await fetch('/api/test_connection', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url, api_key, is_emby: type === 'emby' }) });
        const result = await res.json(); showToast(result.message.toUpperCase());
      } catch (err) { showToast('LINK RESPONSE FAILED'); }
    }
    document.getElementById('serverForm').addEventListener('submit', async (e) => {
      e.preventDefault(); const type = document.getElementById('serverType').value; const name = document.getElementById('serverName').value; const url = document.getElementById('serverUrl').value; const api_key = document.getElementById('serverKey').value;
      const data = { name, url, api_key, is_emby: type === 'emby' };
      if (editIndex === -1) { currentConfig.servers.push(data); } else { currentConfig.servers[editIndex] = data; }
      closeModal('serverModal'); await saveConfig();
    });
    async function deleteServer(idx) { currentConfig.servers.splice(idx, 1); await saveConfig(); }
    async function saveSettings() { currentConfig.sync_threshold_seconds = parseInt(document.getElementById('syncThreshold').value); closeModal('settingsModal'); await saveConfig(); }
    async function saveConfig() {
      try {
        const res = await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(currentConfig) });
        const result = await res.json(); showToast(result.message.toUpperCase()); setTimeout(loadDashboard, 1200);
      } catch (err) { showToast('WRITE CONFIG FAILED'); }
    }
    function showToast(msg) { const toast = document.getElementById('toast'); toast.innerText = `> ${msg}`; toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; }, 4000); }
    const savedTheme = localStorage.getItem('hud-theme') || 'cyberpunk'; setTheme(savedTheme); document.getElementById('themeSelector').value = savedTheme;
    loadDashboard(); setInterval(loadDashboard, 3000);
  </script>
</body>
</html>
